<!DOCTYPE html>
<html>
<head>
  <title>Isma u Spelli</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      padding: 30px;
      border-radius: 20px;
      width: 360px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      text-align: center;
      color: white;
    }

    h1 { margin-bottom: 10px; }
    h3, h4 { margin: 5px 0; }

    input {
      padding: 14px;
      width: 90%;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
      text-align: center;
    }

    button {
      padding: 12px 18px;
      margin: 8px 5px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* Pastel colors */
    .primary { background: #a5f3fc; color: black; }
    .secondary { background: #fde68a; color: black; }
    .alevel { background: #fbcfe8; color: black; }

    #result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }

    .menu-box {
  background: #22c55e; /* green */
  color: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}
    .menu-box button {
  background: white;
  color: #22c55e;
}
  </style>
</head>

<body>

<div id="box" class="container">

  <!-- LEVEL SELECT SCREEN -->
<div id="menu" class="menu-box">
    <h1>Agħżel Livell 🎯</h1>

    <button onclick="startGame('primary')">Primary</button>
    <button onclick="startGame('secondary')">Secondary</button>
    <button onclick="startGame('alevel')">A-Level</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game" style="display:none;">

    <h1>Isma u Spelli 🎧</h1>

    <h4>Livell: <span id="levelName"></span></h4>

    <h3>Punti: <span id="score">0</span></h3>
    <h4>L-Aqwa: <span id="highScore">0</span></h4>
    <h4>Serje: <span id="streak">0</span></h4>

    <button onclick="newWord()">▶️ Kelma Ġdida</button>

    <br><br>

    <input type="text" id="answer" placeholder="Ikteb dak li tisma">

    <br><br>

    <button onclick="checkAnswer()">Iċċekkja</button>

    <p id="result"></p>

    <audio id="audio"></audio>

  </div>

</div>

<script>
let score = 0;
let streak = 0;

let highScore = localStorage.getItem("highScore") || 0;

const wordLevels = {
  primary: [
    { word: "skola", audio: "skola.mp3" },
    { word: "dar", audio: "dar.mp3" }
      { word: "għasfur", audio: "ghasfur.mp3" },
    { word: "familja", audio: "familja.mp3" }
   { word: "kuljum", audio: "kuljum.mp3" },
    { word: "bżonn", audio: "bżonn.mp3" }
   { word: "tiġieġa", audio: "tiġieġa.mp3" },
    { word: "mexa", audio: "mexa.mp3" }
   { word: "imxejt", audio: "imxejt.mp3" },
    { word: "organizzazzjoni", audio: "organizzazzjoni.mp3" }
  ],
  secondary:
  { word: "responsabbiltà", audio: "responsabbilta.mp3" },
    { word: "indipendenza", audio: "indipendenza.mp3" }
   { word: "żbroffa", audio: "żbroffa.mp3" },
    { word: "organizzazzjoni", audio: "organizzazzjoni.mp3" }
 { word: "żball", audio: "żball.mp3" },
    { word: "baqa'", audio: "baqa'.mp3" }
   { word: "negattiv", audio: "negattiv.mp3" },
    { word: "taqta'", audio: "taqta'.mp3" }
   { word: "snajja'", audio: "snajja'.mp3" },
    { word: "ħeffa", audio: "ħeffa.mp3" }
   { word: "qabelxejn", audio: "qabelxejn.mp3" },
    { word: "jgħin", audio: "jgħin.mp3" }
   { word: "avvanzat", audio: "avvanzat.mp3" },
    { word: "jifhmu", audio: "jifhmu.mp3" }
   { word: "nirrakkomandaw", audio: "nirrakkomandaw.mp3" },
    { word: "għarfien", audio: "għarfien.mp3" }
  ]
};
 
  alevel:
  { word: "responsabbiltà", audio: "responsabbilta.mp3" },
    { word: "indipendenza", audio: "indipendenza.mp3" }
   { word: "bilqiegħda", audio: "bilqiegħda.mp3" },
    { word: "joqogħdu", audio: "joqogħdu.mp3" }
   { word: "xbieha", audio: "xbieha.mp3" },
    { word: "iqegħduha", audio: "iqegħduha.mp3" }
   { word: "tingħata", audio: "tingħata.mp3" },
    { word: "jistqarr", audio: "jistqarr.mp3" }
   { word: "ħjiel", audio: "ħjiel.mp3" },
    { word: "pijunier", audio: "pijunier.mp3" }
   { word: "tgħib", audio: "tgħib.mp3" },
    { word: "atteati", audio: "atteati.mp3" }
   { word: "krisi", audio: "krisi.mp3" },
    { word: "indipendenza", audio: "indipendenza.mp3" }
  ]
};

let currentLevel = "";
let currentWord = {};

function startGame(level) {
  currentLevel = level;

  // switch screens
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  // set color
  document.getElementById("box").className = "container " + level;

  // show level
  document.getElementById("levelName").innerText = level.toUpperCase();

  document.getElementById("highScore").innerText = highScore;
}

function newWord() {
  let words = wordLevels[currentLevel];
  let randomIndex = Math.floor(Math.random() * words.length);
  currentWord = words[randomIndex];

  document.getElementById("answer").value = "";
  let result = document.getElementById("result");
  result.innerText = "";
  result.style.color = "white";

  let audio = document.getElementById("audio");
  audio.src = currentWord.audio;
  audio.load();
  audio.play();
}

function checkAnswer() {
  let userAnswer = document.getElementById("answer").value;
  let result = document.getElementById("result");

  if (userAnswer.toLowerCase() === currentWord.word.toLowerCase()) {
    result.innerText = "✅ Tajjeb ħafna!";
    result.style.color = "lightgreen";

    score++;
    streak++;

    document.getElementById("score").innerText = score;
    document.getElementById("streak").innerText = streak;

    if (score > highScore) {
      highScore = score;
      localStorage.setItem("highScore", highScore);
      document.getElementById("highScore").innerText = highScore;
    }

    setTimeout(() => newWord(), 1000);

  } else {
    result.innerText =
      "❌ Mhux tajjeb. Il-kelma: " + currentWord.word;
    result.style.color = "white";

    streak = 0;
    document.getElementById("streak").innerText = streak;
  }
}
</script>

</body>
</html>
