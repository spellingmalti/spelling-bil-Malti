<!DOCTYPE html>
<html>
<head>
  <title>Isma u Spelli</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      padding: 30px;
      border-radius: 20px;
      width: 360px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      text-align: center;
      color: white;
      transition: 0.3s;
    }

    h1 { margin-bottom: 10px; }
    h3, h4 { margin: 5px 0; }

    .level {
      margin-bottom: 10px;
      font-weight: bold;
    }

    input {
      padding: 14px;
      width: 90%;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
      text-align: center;
    }

    button {
      padding: 10px 14px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .primary { background: #a5f3fc; color: black; }
    .secondary { background: #fde68a; color: black; }
    .alevel { background: #fbcfe8; color: black; }

    .locked {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div id="box" class="container">

  <h1>Isma u Spelli 🎧</h1>

  <div class="level">Livell: <span id="levelName">Primary</span></div>

  <h3>Punti: <span id="score">0</span></h3>
  <h4>L-Aqwa: <span id="highScore">0</span></h4>
  <h4>Serje: <span id="streak">0</span></h4>

  <div>
    <button id="primaryBtn" onclick="setLevel('primary')">Primary</button>
    <button id="secondaryBtn" onclick="setLevel('secondary')">Secondary 🔒</button>
    <button id="alevelBtn" onclick="setLevel('alevel')">A-Level 🔒</button>
  </div>

  <br>

  <button onclick="newWord()">▶️ Kelma Ġdida</button>

  <br><br>

  <input type="text" id="answer" placeholder="Ikteb dak li tisma">

  <br><br>

  <button onclick="checkAnswer()">Iċċekkja</button>

  <p id="result"></p>

  <audio id="audio"></audio>

</div>

<script>
let score = 0;
let streak = 0;

let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

const wordLevels = {
  primary: [
    { word: "skola", audio: "skola.mp3" },
    { word: "dar", audio: "dar.mp3" }
  ],
  secondary: [
    { word: "għasfur", audio: "ghasfur.mp3" },
    { word: "familja", audio: "familja.mp3" }
  ],
  alevel: [
    { word: "responsabbiltà", audio: "responsabbilta.mp3" },
    { word: "indipendenza", audio: "indipendenza.mp3" }
  ]
};

let currentLevel = "primary";
let currentWord = {};

let unlocked = {
  secondary: false,
  alevel: false
};

function updateUI() {
  let box = document.getElementById("box");
  box.className = "container " + currentLevel;

  document.getElementById("levelName").innerText =
    currentLevel.toUpperCase();
}

function setLevel(level) {
  if (level !== "primary" && !unlocked[level]) {
    alert("🔒 Dan il-livell għadu msakkar!");
    return;
  }

  currentLevel = level;
  updateUI();
}

function newWord() {
  let words = wordLevels[currentLevel];
  let randomIndex = Math.floor(Math.random() * words.length);
  currentWord = words[randomIndex];

  document.getElementById("answer").value = "";
  let result = document.getElementById("result");
  result.innerText = "";
  result.style.color = "white";

  let audio = document.getElementById("audio");
  audio.src = currentWord.audio;
  audio.load();
  audio.play();
}

function checkAnswer() {
  let userAnswer = document.getElementById("answer").value;
  let result = document.getElementById("result");

  if (userAnswer.toLowerCase() === currentWord.word.toLowerCase()) {
    result.innerText = "✅ Tajjeb ħafna!";
    result.style.color = "lightgreen";

    score++;
    streak++;

    document.getElementById("score").innerText = score;
    document.getElementById("streak").innerText = streak;

    if (score > highScore) {
      highScore = score;
      localStorage.setItem("highScore", highScore);
      document.getElementById("highScore").innerText = highScore;
    }

    // 🔓 Unlock logic
    if (score >= 3) {
      unlocked.secondary = true;
      document.getElementById("secondaryBtn").innerText = "Secondary";
    }

    if (score >= 6) {
      unlocked.alevel = true;
      document.getElementById("alevelBtn").innerText = "A-Level";
    }

    setTimeout(() => newWord(), 1000);

  } else {
    result.innerText =
      "❌ Mhux tajjeb. Il-kelma: " + currentWord.word;
    result.style.color = "white";

    streak = 0;
    document.getElementById("streak").innerText = streak;
  }
}

updateUI();
</script>

</body>
</html>
