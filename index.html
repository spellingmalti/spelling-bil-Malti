<!DOCTYPE html>
<html>
<head>
  <title>Isma u Spelli</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    /* BIG WHITE GAME BOX */
    #game, #menu, #categoryMenu {
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #ffffff;
      border-radius: 25px;
      padding: 40px;
      width: 500px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 34px;
    }

    h3, h4 {
      margin: 10px 0;
      color: #334155;
      font-size: 22px;
    }

    input {
      padding: 18px;
      width: 90%;
      border-radius: 14px;
      border: none;
      margin-top: 15px;
      font-size: 20px;
      text-align: center;
      background: #f1f5f9;
    }

    button {
      padding: 16px 26px;
      margin: 10px;
      border: none;
      border-radius: 14px;
      font-weight: bold;
      cursor: pointer;
      background: white;
      color: #16a34a;
      font-size: 18px;
      transition: 0.2s;
    }

    button:hover {
      background: #ecfdf5;
      transform: scale(1.08);
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
      font-size: 22px;
    }

    audio {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="box" class="container">

  <!-- LEVEL MENU -->
  <div id="menu">
    <h1>Agħżel Livell 🎯</h1>

    <button onclick="startGame('primarja')">Primarja</button>
    <button onclick="startGame('secondarja')">Secondarja</button>
    <button onclick="startGame('avvanzat')">Avvanzat</button>
  </div>

  <!-- CATEGORY MENU -->
  <div id="categoryMenu" style="display:none;">
    <h2>Agħżel Kategorija 📚</h2>

    <button onclick="setCategory('animals')">Annimali</button>
    <button onclick="setCategory('school')">Skola</button>
    <button onclick="setCategory('home')">Dar</button>
  </div>

  <!-- GAME -->
  <div id="game" style="display:none;">
    <h1>🎧 Isma u Spelli</h1>

    <h4>Livell: <span id="levelName"></span></h4>

    <h3>Punti: <span id="score">0</span></h3>
    <h4>L-Aqwa Highscore: <span id="highScore">0</span></h4>
    <h4>Streak: <span id="streak">0</span></h4>

    <button onclick="newWord()">Kelma Ġdida</button>

    <br><br>

    <input type="text" id="answer" placeholder="Ikteb dak li tisma">

    <br><br>

    <button onclick="checkAnswer()">Iċċekkja</button>

    <p id="result"></p>

    <audio id="audio"></audio>
  </div>

</div>

<script>
let score = 0;
let streak = 0;
let highScore = localStorage.getItem("highScore") || 0;

let currentLevel = "";
let currentCategory = "";
let currentWord = {};

const wordLevels = {
  primarja: {
    animals: [
      { word: "għasfur", audio: "ghasfur.mp3" },
      { word: "tiġieġa", audio: "tigiega.mp3" }
    ],
    school: [
      { word: "skola", audio: "skola.mp3" },
      { word: "student", audio: "student.mp3" }
    ],
    home: [
      { word: "dar", audio: "dar.mp3" },
      { word: "familja", audio: "familja.mp3" }
    ]
  },

  secondarja: [
    { word: "responsabbiltà", audio: "responsabbilta.mp3" },
    { word: "indipendenza", audio: "indipendenza.mp3" }
  ],

  avvanzat: [
    { word: "pijunier", audio: "pijunier.mp3" },
    { word: "krisi", audio: "krisi.mp3" }
  ]
};

function startGame(level) {
  currentLevel = level;
  document.getElementById("menu").style.display = "none";

  if (level === "primarja") {
    document.getElementById("categoryMenu").style.display = "block";
  } else {
    startPlay();
  }
}

function setCategory(category) {
  currentCategory = category;
  document.getElementById("categoryMenu").style.display = "none";
  startPlay();
}

function startPlay() {
  document.getElementById("game").style.display = "block";
  document.getElementById("levelName").innerText = currentLevel.toUpperCase();
  document.getElementById("highScore").innerText = highScore;
}

function newWord() {
  let words;

  if (currentLevel === "primarja") {
    words = wordLevels.primarja[currentCategory];
  } else {
    words = wordLevels[currentLevel];
  }

  let randomIndex = Math.floor(Math.random() * words.length);
  currentWord = words[randomIndex];

  document.getElementById("answer").value = "";
  document.getElementById("result").innerText = "";

  let audio = document.getElementById("audio");
  audio.src = currentWord.audio;
  audio.load();
  audio.play();
}

function checkAnswer() {
  let userAnswer = document.getElementById("answer").value;
  let result = document.getElementById("result");

  if (userAnswer.toLowerCase() === currentWord.word.toLowerCase()) {
    result.innerText = "✅ Tajjeb ħafna!";
    result.style.color = "green";

    score++;
    streak++;

    document.getElementById("score").innerText = score;
    document.getElementById("streak").innerText = streak;

    if (score > highScore) {
      highScore = score;
      localStorage.setItem("highScore", highScore);
      document.getElementById("highScore").innerText = highScore;
    }

    setTimeout(() => newWord(), 1000);

  } else {
    result.innerText = "❌ Mhux tajjeb. Il-kelma: " + currentWord.word;
    result.style.color = "red";

    streak = 0;
    document.getElementById("streak").innerText = streak;
  }
}
</script>

</body>
</html>
</html>
